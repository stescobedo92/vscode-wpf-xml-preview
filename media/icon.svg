  <line x1="42" y1="38" x2="34" y2="66" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Arrow pointing right -->
  <path d="M68 52L78 52" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M75 47L80 52L75 57" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <!-- Preview panel (right side) -->
  <rect x="84" y="24" width="32" height="56" rx="4" fill="white" fill-opacity="0.2" stroke="white" stroke-width="2"/>
  <!-- Tree lines in preview -->
  <circle cx="92" cy="36" r="2.5" fill="white" opacity="0.9"/>
  <line x1="95" y1="36" x2="110" y2="36" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <circle cx="96" cy="46" r="2.5" fill="white" opacity="0.7"/>
  <line x1="99" y1="46" x2="112" y2="46" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <circle cx="96" cy="56" r="2.5" fill="white" opacity="0.7"/>
  <line x1="99" y1="56" x2="108" y2="56" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <circle cx="92" cy="66" r="2.5" fill="white" opacity="0.9"/>
  <line x1="95" y1="66" x2="106" y2="66" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- Label -->
  <text x="64" y="108" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.9">XML PREVIEW</text>
